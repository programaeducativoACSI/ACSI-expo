<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Osaka Vision Pro: Final</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-verde: #80B0A4; --color-rojo: #D04F2C;
            --color-amarillo: #D9AC36; --color-naranja: #D6742B;
            --color-cafe: #431E15; --color-crema: #fffaf0;
            --color-azul: #4A90E2; --color-oro: #FFD700;
            --color-madera: #8d6e63;
        }

        body {
            background-color: var(--color-crema);
            font-family: 'Press Start 2P', cursive;
            margin: 0; overflow: hidden; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; width: 100vw;
        }

        #welcome-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--color-crema);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 9000; text-align: center; padding: 20px;
        }

        .retro-title {
            font-size: 1.2rem; color: var(--color-rojo);
            text-shadow: 4px 4px 0px var(--color-cafe), 8px 8px 0px var(--color-naranja);
            margin-bottom: 20px; line-height: 1.4;
        }

        .tv-furniture {
            position: relative;
            width: 95vw; max-width: 460px;
            background-color: var(--color-madera);
            border: 10px solid #5d4037; border-radius: 40px;
            padding: 30px 10px; box-shadow: 0 20px 0 #3d2b1f, 0 30px 50px rgba(0,0,0,0.5);
            display: flex; flex-direction: column; align-items: center;
        }

        .tv-screen {
            width: 85%; height: 210px; background: #1a1a1a;
            border: 8px solid #b8860b; border-radius: 20px;
            overflow: hidden; perspective: 1000px;
            display: flex; align-items: center; justify-content: center;
            position: relative;
        }

        .carousel { width: 180px; height: 120px; position: relative; transform-style: preserve-3d; transition: transform 0.8s; }
        
     .cassette-card { 
    position: absolute; width: 120px; height: 80px; 
    display: flex; align-items: center; justify-content: center;
    backface-visibility: hidden; cursor: pointer;
    border: none; background-color: transparent; /* Limpio */
}
        
        .cassette-card.active { border: 4px solid var(--color-oro); box-shadow: 0 0 15px var(--color-oro); }

        .controls-panel { width: 100%; display: grid; grid-template-columns: 1fr 2fr 1fr; align-items: center; gap: 10px; color: white; margin-top: 15px; }
        .knob-container { display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .knob { width: 45px; height: 45px; background: #222; border: 4px solid var(--color-oro); border-radius: 50%; cursor: pointer; transition: transform 0.5s; position: relative; }
        .knob::after { content: ''; position: absolute; top: 5px; left: 50%; width: 4px; height: 12px; background: var(--color-oro); transform: translateX(-50%); }
        
        .nav-buttons-container { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; margin-bottom: 10px; }
        .btn-yellow { background: var(--color-amarillo); color: var(--color-cafe); border: none; padding: 10px; font-family: 'Press Start 2P'; font-size: 0.4rem; cursor: pointer; box-shadow: 3px 3px 0px #000; }
        
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .btn-nav { background: var(--color-amarillo); border: none; padding: 10px; font-family: 'Press Start 2P'; font-size: 0.45rem; cursor: pointer; box-shadow: 3px 3px 0px #000; }
        
      .display-text-area {
    width: 100%;
    text-align: center;
    margin-top: 20px;
    min-height: 80px;
}
        #currentTitle {
    font-size: 0.7rem; /* Título en Grande */
    color: var(--color-oro);
    margin-bottom: 10px;
    text-shadow: 2px 2px 0px #000;
}
        #mode-label {
    font-size: 0.5rem; /* Modo en Grande */
    color: var(--color-amarillo);
    letter-spacing: 2px;
}

        .btn-top-left { position: absolute; top: 15px; left: 15px; z-index: 1000; background: var(--color-rojo); color: white; border: 2px solid var(--color-cafe); padding: 8px; font-size: 0.35rem; cursor: pointer; }
    </style>
</head>
<body>

<div id="welcome-screen">
    <h1 class="retro-title">OSAKA 1969<br>VISION PRO</h1>
    <button class="btn-nav" style="background:var(--color-verde); padding:20px;" onclick="initExperience()">COMENZAR</button>
</div>

<button class="btn-top-left" onclick="startTrivia()">DINÁMICAS</button>

<div class="tv-furniture">
    <div class="tv-screen">
        <div class="carousel" id="carouselContainer"></div>
    </div>
    
    <div class="display-text-area">
        <div id="mode-label">CARGANDO...</div>
        <div id="currentTitle">BIENVENIDO</div>
    </div>

    <div class="controls-panel">
        </div>
</div>
        <div class="knob-container">
            <div id="mode-knob" class="knob" onclick="nextMode()"></div>
            <span style="font-size:0.3rem; color:var(--color-oro);">MODO</span>
        </div>
        <div style="display:flex; flex-direction:column; align-items:center;">
            <div id="mode-label" style="font-size:0.35rem; color:var(--color-amarillo);">MURALES</div>
            <div class="nav-buttons-container">
                <button class="btn-yellow" onclick="rotateCarousel(-1)">RETURN</button>
                <button class="btn-yellow" onclick="rotateCarousel(1)">NEXT</button>
            </div>
            <div class="btn-group">
                <button class="btn-nav" onclick="playCurrent()">PLAY</button>
                <button class="btn-nav" style="background:var(--color-azul);" onclick="stopAudioForce()">STOP</button>
            </div>
        </div>
        <div class="knob-container">
            <div class="knob" onclick="toggleLanguage()"></div>
            <span style="font-size:0.3rem; color:var(--color-oro);">LANG</span>
        </div>
    </div>
</div>

<script>
// 1. ESTADO GLOBAL
let content = {}; 
let modes = [];
let currentModeIdx = 0;
let currentIndex = 0;
let currentLang = 'es-MX';
const langOptions = ['es-MX', 'en-US', 'zh-CN', 'fr-FR', 'de-DE', 'nah-MX'];
let langIdx = 0;

// 2. INICIO DE EXPERIENCIA
window.initExperience = function() {
    const welcome = document.getElementById('welcome-screen');
    if (welcome) welcome.style.display = 'none';
    if (modes.length > 0) buildCarousel();
};

// 3. CARGA DINÁMICA DESDE GOOGLE SHEETS
async function loadDataFromSheets() {
    const url = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSD2Opou5Ul65XnSAKRq_ozBuqgl6SkxEuPKl1vSGPl_Y5oWJty_m1fbY0f85APgssD2RgnID9Mq9ba/pub?output=csv';
    
    try {
        const response = await fetch(url);
        const data = await response.text();
        const rows = data.split(/\r?\n/).filter(row => row.trim() !== "");

        // --- FILA 2 (Índice 1): CONTROL DE DISEÑO Y TÍTULO PRINCIPAL ---
        if (rows[1]) {
            const config = rows[1].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
            const clean = (v) => v ? v.replace(/^"|"$/g, "").trim() : "";

            const tituloA2    = clean(config[0]); // A2: Título de Inicio
            const fontB2      = clean(config[1]) || "'Press Start 2P'"; // B2
            const colorC2     = clean(config[2]); // C2: Color Título
            const colorD2     = clean(config[3]); // D2: Fondo General
            const colorE2     = clean(config[4]); // E2: Color Fuente Casetes
            const assetF2     = clean(config[5]); // F2: LINK DE IMAGEN O COLOR
            const colorG2     = clean(config[6]); // G2: Color Botón Dinámicas
            const colorH2     = clean(config[7]); // H2: Fondo Menú Dinámicas

            // Aplicar Título Principal desde A2
            const titleEl = document.querySelector('.retro-title');
            if(titleEl) {
                titleEl.innerHTML = tituloA2.replace(/\\n/g, '<br>');
                titleEl.style.color = colorC2;
                titleEl.style.fontFamily = fontB2;
            }

            // Estilos de Pantalla y Cuerpo
            document.body.style.backgroundColor = colorD2;
            document.body.style.fontFamily = fontB2;
            const welcome = document.getElementById('welcome-screen');
            if(welcome) welcome.style.backgroundColor = colorD2;

            // Guardamos el tema para los casetes
            window.activeTheme = { 
                caseteVisual: assetF2, 
                caseteTxt: colorE2,
                btnDin: colorG2,
                bgDin: colorH2 
            };
        }

        // --- FILA 3 O 4 EN ADELANTE: CONTENIDO ---
        content = {}; 
        let lastCat = "";
        
        // Empezamos a leer datos desde la fila 3 (índice 2) 
        // o fila 4 (índice 3) si tienes encabezados extra. 
        // Usaremos slice(2) para saltar Fila 1 (Encabezados) y Fila 2 (Config).
        rows.slice(2).forEach(row => {
            const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
            if (cols.length >= 2) {
                const cleanV = (v) => v ? v.replace(/^"|"$/g, "").trim() : "";
                
                let cat = cleanV(cols[0]); // Columna A
                let title = cleanV(cols[1]); // Columna B

                // Si la fila es un encabezado repetido como "Título" o "Categoría", la saltamos
                if (title.toLowerCase() === "título" || cat.toLowerCase() === "categoria") return;

                // Lógica de "Arrastre" para celdas combinadas en A
                if (cat === "" && lastCat !== "") cat = lastCat;
                else if (cat !== "") lastCat = cat;

                if (cat && title) {
                    if (!content[cat]) content[cat] = [];
                    content[cat].push({
                        t: title,
                        es: cleanV(cols[2]), en: cleanV(cols[3]), zh: cleanV(cols[4]),
                        fr: cleanV(cols[5]), de: cleanV(cols[6]), nah: cleanV(cols[7])
                    });
                }
            }
        });

        modes = Object.keys(content);
        if (modes.length > 0 && document.getElementById('welcome-screen').style.display === 'none') {
            buildCarousel();
        }
    } catch (e) { console.error("Error de sincronización con Sheets:", e); }
}


function buildCarousel() {
    const container = document.getElementById('carouselContainer');
    if(!container) return;
    container.innerHTML = '';
    
    const items = content[modes[currentModeIdx]];
    const total = items.length;
    const theta = 360 / total;
    const radius = Math.max(220, Math.round((75 / Math.tan(Math.PI / total))) + 100);

    items.forEach((item, i) => {
        const card = document.createElement('div');
        card.className = 'cassette-card';
        
        // Jala la imagen desde F2 (Celda 6 de la fila 2)
        const visual = window.activeTheme.caseteVisual;
        if (visual.includes('http') || visual.includes('.')) {
            card.style.backgroundImage = `url(${visual})`;
            card.style.backgroundSize = '100% 100%';
        } else {
            card.style.backgroundColor = visual || '#D6742B';
        }
        
        // NOTA: Ya no agregamos innerHTML con el nombre para que el casete esté limpio
        card.style.transform = `rotateY(${i * theta}deg) translateZ(${radius}px)`;
        card.onclick = () => { currentIndex = i; updateSelection(); playCurrent(); };
        container.appendChild(card);
    });
    
    // Actualizamos el modo en grande
    document.getElementById('mode-label').innerText = `MODO: ${modes[currentModeIdx].toUpperCase()}`;
    updateSelection();
}
// 5. NAVEGACIÓN
function nextMode() {
    window.speechSynthesis.cancel();
    currentModeIdx = (currentModeIdx + 1) % modes.length;
    currentIndex = 0;
    document.getElementById('mode-knob').style.transform = `rotate(${currentModeIdx * 90}deg)`;
    buildCarousel();
}

function rotateCarousel(dir) {
    window.speechSynthesis.cancel();
    const items = content[modes[currentModeIdx]];
    currentIndex = (currentIndex + dir + items.length) % items.length;
    updateSelection();
}

function updateSelection() {
    const cards = document.querySelectorAll('.cassette-card');
    if (cards.length === 0) return;
    const theta = 360 / cards.length;
    document.getElementById('carouselContainer').style.transform = `rotateY(${-currentIndex * theta}deg)`;
    cards.forEach((card, i) => card.classList.toggle('active', i === currentIndex));
    document.getElementById('currentTitle').innerText = content[modes[currentModeIdx]][currentIndex].t;
}

// 6. AUDIO (Columnas C a H)
function toggleLanguage() {
    window.speechSynthesis.cancel();
    langIdx = (langIdx + 1) % langOptions.length;
    currentLang = langOptions[langIdx];
    document.getElementById('lang-knob').style.transform = `rotate(${langIdx * 60}deg)`;
    playCurrent();
}

function playCurrent() {
    window.speechSynthesis.cancel();
    const item = content[modes[currentModeIdx]][currentIndex];
    const langMap = { 'es-MX': 'es', 'en-US': 'en', 'zh-CN': 'zh', 'fr-FR': 'fr', 'de-DE': 'de', 'nah-MX': 'nah' };
    const text = item[langMap[currentLang]] || item.es;
    
    const msg = new SpeechSynthesisUtterance(text);
    msg.lang = (currentLang === 'nah-MX') ? 'es-MX' : currentLang;
    window.speechSynthesis.speak(msg);
}

document.addEventListener('DOMContentLoaded', loadDataFromSheets);
</script>
</body>
</html>
