<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dinámicas - Museo</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=DotGothic16&display=swap" rel="stylesheet">
    <style>
        body { 
            margin: 0; padding: 20px; min-height: 100vh;
            display: flex; flex-direction: column; align-items: center;
            font-family: 'Press Start 2P', cursive; transition: background 0.5s;
        }
        #main-menu { text-align: center; margin-top: 40px; }
        .game-section { display: none; width: 95%; max-width: 500px; text-align: center; margin-top: 20px; }
        
        .btn-game { 
            display: block; width: 280px; margin: 15px auto; padding: 15px;
            border: none; cursor: pointer; font-family: 'Press Start 2P';
            font-size: 0.5rem; box-shadow: 4px 4px 0px #000;
        }
        .back-link { position: fixed; top: 20px; left: 20px; text-decoration: none; font-size: 0.6rem; padding: 15px; border-radius: 2px; z-index: 100;}

        /* CAMBIO 2: Color de letra de la selección de MODO a BLANCO */
        #mode-label { color: #ffffff; font-size: 0.5rem; margin-top: 10px; display: block; }

        .panel { border: 6px solid #000; padding: 20px; background: rgba(0,0,0,0.1); border-radius: 10px; }
        #hintBox { font-size: 0.4rem; text-align: left; line-height: 1.8; margin-bottom: 15px; }
        input { width: 80%; padding: 10px; font-family: 'Press Start 2P'; font-size: 0.5rem; margin-bottom: 10px; }
        
        #memory-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; padding: 10px; }
        .card { height: 120px; width: 100%; background: #333; cursor: pointer; display: flex; align-items: center; justify-content: center; border: 3px solid #fff; border-radius: 10px; overflow: hidden; position: relative; box-shadow: 4px 4px 0px rgba(0,0,0,0.5); }
        .card img { width: 100%; height: 100%; object-fit: contain; background: #000; display: none; }
        .card span { display: none; font-size: 0.5rem; padding: 10px; text-align: center; line-height: 1.2; word-break: break-word; }
        .card.flipped img, .card.flipped span { display: block; }

        #puzzle-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; width: 330px; height: 330px; margin: 0 auto; border: 5px solid #000; background-color: #222; }
        .tile { width: 110px; height: 110px; background-size: 330px 330px; background-repeat: no-repeat; cursor: pointer; border: 1px solid rgba(255,255,255,0.1); box-sizing: border-box; }
        .tile.empty { background: #eee !important; cursor: default; }

        #victory-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); display: none; justify-content: center; align-items: center; z-index: 1000;
        }
        .papiro {
            background: #f4e4bc;
            background-image: url('https://www.transparenttextures.com/patterns/beige-paper.png');
            padding: 40px; border: 2px solid #d4a373; border-radius: 5px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5); text-align: center; max-width: 80%;
            border: 10px solid #8b5a2b; border-style: double;
        }
        .papiro h2 { color: #800000; font-size: 0.8rem; margin-bottom: 20px; }
        .papiro p { color: #333; font-size: 0.5rem; line-height: 1.5; margin-bottom: 20px; }
    </style>
</head>
<body>

    <button id="btn-regresar" class="back-link" onclick="salirAExposicion()">VOLVER</button>
    
    <div id="main-menu">
        <h1 id="titulo-principal" style="font-size: 0.8rem;">DINÁMICAS MUSEO</h1>
        <span id="mode-label">MODO: MURALES</span>
        <button class="btn-game" onclick="runTrivia()">1. ADIVINA</button>
        <button class="btn-game" onclick="runMemory()">2. MEMORAMA</button>
        <button class="btn-game" onclick="runPuzzle()">3. PUZZLE</button>
    </div>

    <div id="view-trivia" class="game-section">
        <button class="btn-game" onclick="showHome()" style="font-size: 0.3rem; width: auto;">ATRÁS</button>
        <div class="panel">
            <div id="hintBox"></div>
            <input type="text" id="ansInput" placeholder="RESPUESTA...">
            <button class="btn-game" style="width: 100%;" onclick="checkAns()">VALIDAR</button>
            <button id="btn-next-hint" class="btn-game" style="width: 100%;" onclick="nextHint()">OTRA PISTA</button>
        </div>
    </div>

    <div id="view-memory" class="game-section">
        <button class="btn-game" onclick="showHome()" style="font-size: 0.3rem; width: auto;">ATRÁS</button>
        <div id="memory-grid"></div>
    </div>

    <div id="view-puzzle" class="game-section">
        <button class="btn-game" onclick="showHome()" style="font-size: 0.3rem; width: auto;">ATRÁS</button>
        <div id="puzzle-grid"></div>
    </div>

    <div id="victory-screen">
        <div class="papiro">
            <h2>¡LOGRO CONSEGUIDO!</h2>
            <p id="victory-msg">Has completado la dinámica correctamente.</p>
            <button class="btn-game" style="width: 100%;" onclick="showHome()">MENU PRINCIPAL</button>
        </div>
    </div>

<script>
    const URL_DINAMICAS = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSTPf6KsrFzsD6zY57ugk3fiqixmZKtIXauOM8x16xQZq-5gY_HzlNmM1EYk9QtnGmaBJQvQf3walml/pub?output=csv';

    let poolTrivia = [], poolMemory = [], poolPuzzle = [];
    let curObj, curHintIdx = 0;
    let colorInstrucciones = "#ffffff";
    
    // CAMBIO 3: Adición de idiomas (incluyendo JP)
    const langOptions = ['es-MX', 'en-US', 'zh-CN', 'fr-FR', 'de-DE', 'nah-MX', 'it-IT', 'pt-BR', 'ja-JP'];
    let langIdx = 0;
    let currentLang = 'es-MX';

    // CAMBIO 1: Manejo de categorías (Modos) dinámico
    let categories = [];
    let currentCatIdx = 0;

    async function init() {
        try {
            const res = await fetch(URL_DINAMICAS + '&cache=' + Date.now()); 
            const csv = await res.text();
            const rows = csv.split(/\r?\n/).filter(r => r.trim() !== "").slice(1);
            const clean = (v) => v ? v.replace(/^"|"$/g, "").trim() : "";
            const cfg = rows[0].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
            
            document.body.style.backgroundColor = clean(cfg[6]);
            const titulo = document.getElementById('titulo-principal');
            if(titulo) titulo.style.color = clean(cfg[7]);
            
            const colorTxtBtn = clean(cfg[8]);
            const colorBgBtn = clean(cfg[9]);
            const btns = document.querySelectorAll('.btn-game, .control-btn, .back-btn, .back-link');
            btns.forEach(b => {
                b.style.color = colorTxtBtn;
                b.style.backgroundColor = colorBgBtn;
            });

            if(document.getElementById('btn-regresar')) document.getElementById('btn-regresar').innerText = clean(cfg[10]) || "VOLVER";
            colorInstrucciones = clean(cfg[11]);

            poolTrivia = []; poolMemory = []; poolPuzzle = [];
            
            // CAMBIO 3: Lectura de Columna K (Japonés es índice 10)
            rows.forEach((row) => {
                const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                
                // Categoría (Col A para los modos)
                let cat = clean(cols[0]);
                if(cat && !categories.includes(cat)) categories.push(cat);

                const pistaA = clean(cols[0]), respuestaB = clean(cols[1]);
                if(respuestaB) {
                    let trivia = poolTrivia.find(x => x.res === respuestaB);
                    if(!trivia) { trivia = { res: respuestaB, pistas: [] }; poolTrivia.push(trivia); }
                    if(pistaA) trivia.pistas.push(pistaA);
                }
                const textoC = clean(cols[2]); 
                const imagenD = convertDriveLink(clean(cols[3])); 
                if(textoC && imagenD) poolMemory.push({ txt: textoC, img: imagenD, jp: clean(cols[10]) }); // Guardamos JP
                
                const imagenE = convertDriveLink(clean(cols[4]));
                if(imagenE) poolPuzzle.push(imagenE);
            });
            
            updateModeLabel();
            applyInstructionColor();
        } catch(e) { console.error("Error crítico de carga:", e); }
    }

    // CAMBIO 1: Función para actualizar el texto del modo
    function updateModeLabel() {
        const label = document.getElementById('mode-label');
        if(label && categories.length > 0) {
            label.innerText = `MODO: ${categories[currentCatIdx].toUpperCase()}`;
        }
    }

    // Simulación de giro de perilla de modo (puedes llamar a esto para probar)
    function nextCategory() {
        currentCatIdx = (currentCatIdx + 1) % categories.length;
        updateModeLabel();
    }

    function convertDriveLink(url) {
        if (!url || !url.includes('drive.google.com')) return url;
        let id = "";
        if (url.includes('id=')) id = url.split('id=')[1].split('&')[0];
        else if (url.includes('/file/d/')) id = url.split('/file/d/')[1].split('/')[0].split('?')[0];
        return id ? `https://lh3.googleusercontent.com/d/${id}` : url;
    }

    function applyInstructionColor() {
        const textos = document.querySelectorAll('#hintBox, .hint-text, .card span');
        textos.forEach(t => { t.style.color = colorInstrucciones; });
    }

    function showHome() {
        document.getElementById('victory-screen').style.display = 'none';
        document.querySelectorAll('.game-section').forEach(s => s.style.display = 'none');
        document.getElementById('main-menu').style.display = 'block';
        if(document.getElementById('btn-regresar')) document.getElementById('btn-regresar').style.display = 'block';
    }

    function ocultarBotonVolver() {
        if(document.getElementById('btn-regresar')) document.getElementById('btn-regresar').style.display = 'none';
    }

    function mostrarVictoria(mensaje) {
        document.getElementById('victory-msg').innerHTML = mensaje;
        document.getElementById('victory-screen').style.display = 'flex';
    }

    // --- JUEGOS (Lógica intacta) ---
    function runTrivia() {
        ocultarBotonVolver();
        if(poolTrivia.length === 0) return;
        curObj = poolTrivia[Math.floor(Math.random() * poolTrivia.length)];
        curHintIdx = 0;
        document.getElementById('main-menu').style.display = 'none';
        document.getElementById('view-trivia').style.display = 'block';
        document.getElementById('hintBox').innerHTML = `PISTA 1:<br>${curObj.pistas[0]}`;
        document.getElementById('ansInput').value = "";
    }

    function nextHint() {
        if(curHintIdx < curObj.pistas.length - 1) {
            curHintIdx++;
            document.getElementById('hintBox').innerHTML += `<br><br>PISTA ${curHintIdx+1}:<br>${curObj.pistas[curHintIdx]}`;
            applyInstructionColor();
        }
    }

    function checkAns() {
        if(document.getElementById('ansInput').value.trim().toLowerCase() === curObj.res.toLowerCase()) {
            mostrarVictoria("¡EXCELENTE!<br>Has adivinado correctamente.");
        } else alert("INTENTA DE NUEVO");
    }

    let flippedCards = [], matchesFound = 0;
    function runMemory() {
        ocultarBotonVolver();
        const grid = document.getElementById('memory-grid'); grid.innerHTML = ''; 
        document.getElementById('main-menu').style.display = 'none';
        document.getElementById('view-memory').style.display = 'block';
        flippedCards = []; matchesFound = 0;
        if (poolMemory.length < 3) return alert("Faltan datos.");
        let selection = [...poolMemory].sort(() => 0.5 - Math.random()).slice(0, 3);
        let gameSet = [];
        selection.forEach(item => {
            gameSet.push({ id: item.txt, type: 'img', content: item.img });
            // CAMBIO 3: Si el idioma es JP, podríamos usar item.jp si fuera necesario
            gameSet.push({ id: item.txt, type: 'txt', content: item.txt });
        });
        gameSet.sort(() => 0.5 - Math.random());
        gameSet.forEach(data => {
            const card = document.createElement('div');
            card.className = 'card'; card.dataset.pairId = data.id;
            card.innerHTML = data.type === 'img' ? `<img src="${data.content}">` : `<span>${data.content}</span>`;
            card.onclick = function() {
                if (flippedCards.length < 2 && !this.classList.contains('flipped')) {
                    this.classList.add('flipped'); flippedCards.push(this);
                    if (flippedCards.length === 2) setTimeout(checkMem, 1000);
                }
            };
            grid.appendChild(card);
        });
        applyInstructionColor();
    }

    function checkMem() {
        const [card1, card2] = flippedCards;
        if (card1.dataset.pairId === card2.dataset.pairId) {
            card1.style.visibility = 'hidden'; card2.style.visibility = 'hidden';
            matchesFound++;
            if (matchesFound === 3) mostrarVictoria("¡FANTÁSTICO!<br>Has encontrado todos los pares.");
        } else { card1.classList.remove('flipped'); card2.classList.remove('flipped'); }
        flippedCards = [];
    }

    let puzzlePieces = [], emptyPieceIdx = 8;
    function runPuzzle() {
        ocultarBotonVolver();
        if(poolPuzzle.length === 0) return alert("Sin imágenes.");
        const grid = document.getElementById('puzzle-grid'); grid.innerHTML = '';
        document.getElementById('main-menu').style.display = 'none';
        document.getElementById('view-puzzle').style.display = 'block';
        const img = poolPuzzle[Math.floor(Math.random() * poolPuzzle.length)];
        puzzlePieces = [...Array(8).keys(), 'empty'].sort(() => 0.5 - Math.random());
        emptyPieceIdx = puzzlePieces.indexOf('empty');
        drawPuzzle(img);
    }

    function drawPuzzle(url) {
        const grid = document.getElementById('puzzle-grid'); grid.innerHTML = '';
        puzzlePieces.forEach((p, i) => {
            const div = document.createElement('div');
            div.className = 'tile' + (p === 'empty' ? ' empty' : '');
            if(p !== 'empty') {
                div.style.backgroundImage = `url('${url}')`;
                div.style.backgroundPosition = `-${(p % 3) * 110}px -${Math.floor(p / 3) * 110}px`;
                div.onclick = () => {
                    const adyacentes = [i-1, i+1, i-3, i+3];
                    if(i % 3 === 0) adyacentes[0] = -1;
                    if(i % 3 === 2) adyacentes[1] = -1;
                    if(adyacentes.includes(emptyPieceIdx)) {
                        [puzzlePieces[i], puzzlePieces[emptyPieceIdx]] = [puzzlePieces[emptyPieceIdx], puzzlePieces[i]];
                        emptyPieceIdx = i; drawPuzzle(url);
                        checkPuzzleWin();
                    }
                };
            }
            grid.appendChild(div);
        });
    }

    function checkPuzzleWin() {
        if (puzzlePieces.every((p, i) => p === 'empty' ? i === 8 : p === i)) {
            mostrarVictoria("¡MURAL RESTAURADO!<br>Excelente trabajo.");
        }
    }

    function salirAExposicion() {
        document.body.style.opacity = "0";
        document.body.style.transition = "opacity 0.3s";
        setTimeout(() => { window.location.replace("https://programaeducativoacsi.github.io/ACSI-expo/"); }, 300);
    }

    window.onload = init;
</script>
</body>
</html>
