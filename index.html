<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Exposición San Ildefonso</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
        :root {
            --color-verde: #80B0A4; --color-rojo: #D04F2C;
            --color-amarillo: #D9AC36; --color-naranja: #D6742B;
            --color-cafe: #431E15; --color-crema: #fffaf0;
            --color-azul: #4A90E2; --color-oro: #FFD700;
            --color-madera: #8d6e63;
        }

        body {
            background-color: var(--color-crema);
            font-family: 'Press Start 2P', cursive;
            margin: 0; overflow: hidden; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; width: 100vw;
        }

        #welcome-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--color-crema);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 9000; text-align: center; padding: 20px;
        }

        .retro-title {
            font-size: 1.2rem; color: var(--color-rojo);
            text-shadow: 4px 4px 0px var(--color-cafe), 8px 8px 0px var(--color-naranja);
            margin-bottom: 20px; line-height: 1.4;
        }

        /* MUEBLE DE TV: Ajustado padding inferior para dar espacio a los controles */
        .tv-furniture {
            position: relative;
            width: 95vw; max-width: 460px;
            background-color: var(--color-madera);
            border: 10px solid #5d4037; border-radius: 40px;
            padding: 30px 10px 15px 10px; /* Reducimos padding inferior */
            box-shadow: 0 20px 0 #3d2b1f, 0 30px 50px rgba(0,0,0,0.5);
            display: flex; flex-direction: column; align-items: center;
        }

        .tv-screen {
            width: 85%; height: 210px; background: #1a1a1a;
            border: 8px solid #b8860b; border-radius: 20px;
            overflow: hidden; perspective: 1000px;
            display: flex; align-items: center; justify-content: center;
            position: relative;
        }

        .carousel { width: 180px; height: 120px; position: relative; transform-style: preserve-3d; transition: transform 0.8s; }
        
        .cassette-card { 
            position: absolute; width: 120px; height: 80px; 
            background: var(--color-naranja); border: 2px solid white;
            display: flex; align-items: center; justify-content: center;
            backface-visibility: hidden; cursor: pointer;
        }
        
        .cassette-card.active { border: 4px solid var(--color-oro); box-shadow: 0 0 15px var(--color-oro); }

        /* PANEL DE CONTROLES: Compactado y metido dentro del mueble */
        .controls-panel { 
            width: 90%; 
            display: grid; 
            grid-template-columns: 1fr 1.5fr 1fr; /* Ajuste de columnas */
            align-items: center; 
            gap: 5px; 
            color: white; 
            margin-top: 10px; /* Menos margen superior */
            padding: 5px 10px;
            background: rgba(0,0,0,0.1); /* Fondo muy sutil para integrarlo */
            border-radius: 20px;
        }

        .knob-container { display: flex; flex-direction: column; align-items: center; gap: 2px; }
        .knob { width: 35px; height: 35px; background: #222; border: 3px solid var(--color-oro); border-radius: 50%; cursor: pointer; transition: transform 0.5s; position: relative; }
        .knob::after { content: ''; position: absolute; top: 4px; left: 50%; width: 3px; height: 10px; background: var(--color-oro); transform: translateX(-50%); }
        
        /* Ajuste de textos de control */
        .control-label { font-size: 0.25rem; color: var(--color-oro); text-transform: uppercase; }
        .dynamic-label { font-size: 0.3rem; color: white; margin-top: 2px; }

        .nav-buttons-container { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; width: 100%; margin-bottom: 5px; }
        .btn-yellow { background: var(--color-amarillo); color: var(--color-cafe); border: none; padding: 6px 4px; font-family: 'Press Start 2P'; font-size: 0.35rem; cursor: pointer; box-shadow: 2px 2px 0px #000; }
        
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
        .btn-nav { background: var(--color-amarillo); border: none; padding: 6px 4px; font-family: 'Press Start 2P'; font-size: 0.35rem; cursor: pointer; box-shadow: 2px 2px 0px #000; }
        
        #infoPanel { 
            background: #000; color: #0f0; padding: 10px; font-size: 0.35rem; 
            width: 80%; height: 60px; overflow-y: auto; margin-top: 10px; border: 2px solid #333;
        }

        .btn-top-left { position: absolute; top: 15px; left: 15px; z-index: 1000; background: var(--color-rojo); color: white; border: 2px solid var(--color-cafe); padding: 8px; font-size: 0.35rem; cursor: pointer; }
    </style>
</head>
<body>

<div id="welcome-screen">
    <h1 class="retro-title">OSAKA 1969<br>VISION PRO</h1>
    <button class="btn-nav" style="background:var(--color-verde); padding:20px;" onclick="initExperience()">COMENZAR</button>
</div>

<button class="btn-top-left" onclick="startTrivia()">DINÁMICAS</button>

<div class="tv-furniture">
    <div class="tv-screen">
        <div class="carousel" id="carouselContainer"></div>
    </div>
    
    <div class="display-text-area">
        <div id="mode-label">CARGANDO...</div>
        <div id="currentTitle">BIENVENIDO</div>
    </div>

    <div class="controls-panel">
        <div class="knob-container">
            <div id="mode-knob" class="knob" onclick="nextMode()"></div>
            <span class="control-label">MODO</span>
            <div id="mode-label" class="dynamic-label">MURALES</div> </div>

        <div style="display:flex; flex-direction:column; align-items:center;">
            <div class="nav-buttons-container">
                <button class="btn-yellow" onclick="rotateCarousel(-1)">RETURN</button>
                <button class="btn-yellow" onclick="rotateCarousel(1)">NEXT</button>
            </div>
            <div class="btn-group">
                <button class="btn-nav" onclick="playCurrent()">PLAY</button>
                <button class="btn-nav" style="background:var(--color-azul);" onclick="stopAudioForce()">STOP</button>
            </div>
        </div>
       <div class="knob-container">
            <div id="lang-knob" class="knob" onclick="toggleLanguage()"></div>
            <span class="control-label">LANG</span>
            <div id="lang-label" class="dynamic-label">ES</div> </div>
    </div>
</div>
</div>

<script>
// 1. VARIABLES GLOBALES
let content = {}; 
let modes = [];
let currentModeIdx = 0;
let currentIndex = 0;
let currentLang = 'es-MX';
const langOptions = ['es-MX', 'en-US', 'zh-CN', 'fr-FR', 'de-DE', 'nah-MX'];
const langNames = ['ES', 'EN', 'ZH', 'FR', 'DE', 'NAH']; // Nombres para el display visual
let langIdx = 0;

// 2. INICIO DE EXPERIENCIA
function initExperience() {
    document.getElementById('welcome-screen').style.display = 'none';
    loadDataFromSheets();
}

// 3. CARGA DINÁMICA DESDE GOOGLE SHEETS
async function loadDataFromSheets() {
    const url = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSD2Opou5Ul65XnSAKRq_ozBuqgl6SkxEuPKl1vSGPl_Y5oWJty_m1fbY0f85APgssD2RgnID9Mq9ba/pub?output=csv';
    try {
        const response = await fetch(url);
        const csvText = await response.text();
        const rows = csvText.split(/\r?\n/).filter(row => row.trim() !== "").slice(1);
        content = {}; 
        rows.forEach(row => {
            const columns = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
            if (columns && columns.length >= 2) {
                const clean = (val) => val ? val.replace(/^"|"$/g, "").trim() : "";
                const catRaw = clean(columns[1]).toLowerCase();
                if (!content[catRaw]) content[catRaw] = [];
                content[catRaw].push({
                    t: clean(columns[0]), info: clean(columns[2]),
                    en: clean(columns[3]), zh: clean(columns[4]),
                    fr: clean(columns[5]), de: clean(columns[6]), nah: clean(columns[7])
                });
            }
        });
        modes = Object.keys(content);
        if (modes.length > 0) buildCarousel();
    } catch (e) { console.error("Error en Sheets:", e); }
}

// 4. MOTOR VISUAL DEL CARRUSEL
function buildCarousel() {
    const container = document.getElementById('carouselContainer');
    container.innerHTML = '';
    const items = content[modes[currentModeIdx]];
    const total = items.length;
    const theta = 360 / total;
    const radius = Math.max(180, Math.round((60 / Math.tan(Math.PI / total))) + 100);

    items.forEach((item, i) => {
        const card = document.createElement('div');
        card.className = 'cassette-card';
        card.innerHTML = `<div style="font-size:8px; text-align:center;">${item.t}</div>`;
        card.style.transform = `rotateY(${i * theta}deg) translateZ(${radius}px)`;
        card.onclick = () => { currentIndex = i; updateSelection(); };
        container.appendChild(card);
    });
    // Actualiza el texto de MODO en el display visual
    document.getElementById('mode-label').innerText = modes[currentModeIdx].toUpperCase();
    updateSelection();
}

// 5. NAVEGACIÓN (Next/Return/Modo)
function rotateCarousel(dir) {
    stopAudioForce(); // Silencio al mover
    const items = content[modes[currentModeIdx]];
    currentIndex = (currentIndex + dir + items.length) % items.length;
    updateSelection();
}

function nextMode() {
    stopAudioForce(); // Silencio al cambiar modo
    currentModeIdx = (currentModeIdx + 1) % modes.length;
    currentIndex = 0;
    document.getElementById('mode-knob').style.transform = `rotate(${currentModeIdx * 90}deg)`;
    buildCarousel();
}

// 6. ACTUALIZACIÓN VISUAL (Panel Negro y Título)
function updateSelection() {
    const cards = document.querySelectorAll('.cassette-card');
    if (cards.length === 0) return; 
    const theta = 360 / cards.length;
    document.getElementById('carouselContainer').style.transform = `rotateY(${-currentIndex * theta}deg)`;
    cards.forEach((card, i) => card.classList.toggle('active', i === currentIndex));
    
    const m = content[modes[currentModeIdx]][currentIndex];
    // Selección dinámica de texto según el idioma seleccionado
    const langKeyMap = { 'es-MX': 'info', 'en-US': 'en', 'zh-CN': 'zh', 'fr-FR': 'fr', 'de-DE': 'de', 'nah-MX': 'nah' };
    const textToDisplay = m[langKeyMap[currentLang]] || m.info;
    
    document.getElementById('infoPanel').innerText = textToDisplay;
    document.getElementById('currentTitle').innerText = m.t;
}

// 7. PERILLA LANG (SOLO CAMBIO VISUAL, NO LEE)
function toggleLanguage() {
    // Detenemos cualquier audio anterior
    stopAudioForce();
    
    // Cambiamos el índice del idioma
    langIdx = (langIdx + 1) % langOptions.length;
    currentLang = langOptions[langIdx];
    
    // Gira la perilla visualmente
    document.getElementById('lang-knob').style.transform = `rotate(${langIdx * 60}deg)`;
    
    // Actualiza el indicador visual de texto (ES, EN, ZH...)
    document.getElementById('lang-label').innerText = langNames[langIdx];
    
    // Actualiza el panel negro visualmente, pero NO REPRODUCE AUDIO
    updateSelection();
}

// 8. AUDIO (Único disparador de narración)
function playCurrent() {
    stopAudioForce(); // Reset
    const m = content[modes[currentModeIdx]][currentIndex];
    const langKeyMap = { 'es-MX': 'info', 'en-US': 'en', 'zh-CN': 'zh', 'fr-FR': 'fr', 'de-DE': 'de', 'nah-MX': 'nah' };
    const textToSpeak = m[langKeyMap[currentLang]] || m.info;
    
    const msg = new SpeechSynthesisUtterance(textToSpeak);
    msg.lang = (currentLang === 'nah-MX') ? 'es-MX' : currentLang;
    if(currentLang === 'nah-MX') { msg.rate = 0.8; msg.pitch = 0.9; }
    window.speechSynthesis.speak(msg);
}

function stopAudioForce() { window.speechSynthesis.cancel(); }

function startTrivia() {
    const items = content[modes[currentModeIdx]];
    if (!items || items.length < 2) return;
    const correctIdx = Math.floor(Math.random() * items.length);
    const item = items[correctIdx];
    const panel = document.getElementById('infoPanel');
    panel.innerHTML = `<div style="color:#0f0;">¿Quién es?: "${item.info.substring(0,50)}..."</div>
    <button onclick="buildCarousel()" style="color:#fff; background:#000; border:1px solid #0f0; margin-top:5px; cursor:pointer;">CERRAR</button>`;
}
</script>
</body>
</html>
